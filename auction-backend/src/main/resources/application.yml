spring:
  application:
    name: auction-backend
  sql:
    init:
      mode: always
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/auction_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    timeout: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:change-me-to-a-random-secret-at-least-256-bits}
  expiration-ms: 86400000

server:
  port: 8080

admin:
  bootstrap:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:}
    reset-password: ${ADMIN_RESET_PASSWORD:false}
